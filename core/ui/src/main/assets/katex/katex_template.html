<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>KaTeX Render</title>
<link rel="stylesheet" href="katex.min.css">
<script src="katex.min.js"></script>
<script src="auto-render.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, sans-serif;
    font-size: {{FONT_SIZE}}px;
    color: {{TEXT_COLOR}};
    background: transparent;
    padding: 8px;
    word-wrap: break-word;
    line-height: 1.6;
    overflow: hidden;
    text-align: center;
  }
  .katex { font-size: 1.1em; }
  .katex-display { margin: 0.5em 0; overflow-x: auto; text-align: center; }
</style>
</head>
<body>
  <div id="content"></div>
  <script>
    const content = document.getElementById('content');
    content.textContent = `{{LATEX_CONTENT}}`;

    renderMathInElement(content, {
        delimiters: [
            { left: "$$", right: "$$", display: true  },
            { left: "$",  right: "$",  display: false }
        ],
        throwOnError: false
    });

    function reportHeight() {
        const height = document.body.scrollHeight;
        if (height > 0 && window.Android) {
            window.Android.reportHeight(height);
        }
    }

    // Attendre que les fonts soient chargées avant de mesurer
    if (document.fonts && document.fonts.ready) {
        document.fonts.ready.then(function() {
            setTimeout(reportHeight, 50);
        });
    } else {
        // Fallback pour navigateurs sans document.fonts
        setTimeout(reportHeight, 300);
    }
  </script>
</body>
</html>
